<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>メモ帳</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1E1E1E" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="メモ帳">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Quill -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            max-width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        /* ===== テーマ共通 ===== */
        .container {
            display: flex;
            position: fixed;
            inset: 0;
            overflow: hidden;
        }

        /* ===== 一覧画面 ===== */
        .memo-list-screen {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 8px;
            padding-top: calc(8px + env(safe-area-inset-top));
            flex-shrink: 0;
        }

        .search-bar {
            flex: 1;
            padding: 8px 10px;
            font-size: 16px;
            border-radius: 6px;
            outline: none;
            border: none;
            min-width: 0;
        }

        .icon-btn {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            background: none;
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: rgba(128,128,128,0.2);
        }

        .memo-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .memo-list-item {
            display: flex;
            flex-direction: column;
            padding: 12px 14px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid transparent;
            gap: 2px;
        }

        .memo-list-item:active {
            opacity: 0.7;
        }

        .memo-list-item .memo-title-text {
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .memo-list-item .memo-date-text {
            font-size: 11px;
            opacity: 0.55;
        }

        /* ===== 編集画面 ===== */
        .editor-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            align-items: center;
        }

        /* 最大幅1200px・中央寄せのラッパー */
        .editor-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            min-height: 0;
            overflow: hidden;
        }

        /* 浮島（タイトル行 + ツールバー行） */
        .editor-island {
            margin: 12px clamp(8px, 3vw, 48px) 0;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .editor-header {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 8px;
            padding-top: calc(6px + env(safe-area-inset-top));
            flex-shrink: 0;
        }

        .title-input {
            flex: 1;
            padding: 7px 10px;
            font-size: 16px;
            border-radius: 6px;
            outline: none;
            border: none;
            font-weight: 600;
            min-width: 0;
        }

        /* 浮島内ツールバー：1行・横スクロール */
        .editor-island .ql-toolbar.ql-snow {
            display: flex !important;
            flex-wrap: nowrap !important;
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            border-left: none !important;
            border-right: none !important;
            border-bottom: none !important;
            padding: 4px 8px;
        }
        .editor-island .ql-toolbar.ql-snow::-webkit-scrollbar { display: none; }
        .editor-island .ql-formats {
            display: inline-flex !important;
            flex-shrink: 0;
            vertical-align: top;
        }

        /* ===== Quillエディタ ===== */
        .quill-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .quill-wrapper .ql-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            font-size: 16px;
            border: none !important;
        }

        .quill-wrapper .ql-editor {
            padding: 12px 14px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            min-height: 100%;
            line-height: 1.7;
        }

        .quill-wrapper .ql-editor img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        /* ===== ダークテーマ ===== */
        body.dark {
            background: #1A1A1A;
            color: #E0E0E0;
        }

        .dark .memo-list-screen {
            background: #252525;
            border-right: 1px solid #3A3A3A;
        }

        .dark .list-header {
            background: #252525;
            border-bottom: 1px solid #3A3A3A;
        }

        .dark .search-bar {
            background: #333;
            color: #E0E0E0;
        }

        .dark .search-bar::placeholder { color: #888; }

        .dark .icon-btn { color: #CCC; }

        .dark .memo-list-item {
            border-bottom-color: #333;
            color: #DDD;
        }

        .dark .memo-list-item:hover { background: #333; }

        .dark .active-memo {
            background: #3D3D3D;
            border-left: 3px solid #999;
        }

        .dark .editor-screen {
            background: #1E1E1E;
        }

        .dark .editor-island {
            background: #252525;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }

        .dark .editor-header {
            border-bottom: 1px solid #3A3A3A;
        }

        .dark .title-input {
            background: transparent;
            color: #E0E0E0;
        }

        .dark .title-input::placeholder { color: #666; }

        /* Quillダークテーマ */
        .dark .ql-toolbar {
            background: #252525 !important;
            border-top: 1px solid #3A3A3A !important;
        }

        .dark .ql-toolbar .ql-stroke { stroke: #BBB; }
        .dark .ql-toolbar .ql-fill { fill: #BBB; }
        .dark .ql-toolbar .ql-picker-label { color: #BBB; }
        .dark .ql-toolbar .ql-picker-options { background: #333; color: #DDD; }
        .dark .ql-toolbar button:hover .ql-stroke,
        .dark .ql-toolbar .ql-active .ql-stroke { stroke: #FFF; }
        .dark .ql-toolbar button:hover .ql-fill,
        .dark .ql-toolbar .ql-active .ql-fill { fill: #FFF; }
        .dark .ql-toolbar button:hover,
        .dark .ql-toolbar .ql-active { color: #FFF; }

        .dark .ql-container {
            background: transparent !important;
            color: #E0E0E0 !important;
        }

        .dark .ql-editor { color: #E0E0E0; }
        .dark .ql-editor.ql-blank::before { color: #555; }

        .dark .ql-editor blockquote {
            border-left-color: #555;
            color: #AAA;
        }

        .dark .ql-editor code,
        .dark .ql-editor pre {
            background: #333;
            color: #E0E0E0;
        }

        .dark .ql-editor a { color: #CCC; text-decoration: underline; }

        /* ===== ライトテーマ ===== */
        body.light {
            background: #F5F5F5;
            color: #333;
        }

        .light .memo-list-screen {
            background: #FAFAFA;
            border-right: 1px solid #E0E0E0;
        }

        .light .list-header {
            background: #FAFAFA;
            border-bottom: 1px solid #E0E0E0;
        }

        .light .search-bar {
            background: #EFEFEF;
            color: #333;
        }

        .light .search-bar::placeholder { color: #AAA; }

        .light .icon-btn { color: #555; }

        .light .memo-list-item {
            border-bottom-color: #EEE;
            color: #333;
        }

        .light .memo-list-item:hover { background: #F0F0F0; }

        .light .active-memo {
            background: #E8E8E8;
            border-left: 3px solid #777;
        }

        .light .editor-screen {
            background: #FFF;
        }

        .light .editor-island {
            background: #FAFAFA;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }

        .light .editor-header {
            border-bottom: 1px solid #E0E0E0;
        }

        .light .title-input {
            background: transparent;
            color: #333;
        }

        .light .title-input::placeholder { color: #CCC; }

        .light .ql-toolbar {
            background: #FAFAFA !important;
            border-top: 1px solid #E0E0E0 !important;
        }

        .light .ql-container {
            background: transparent !important;
        }

        /* ===== ログイン画面 ===== */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            background: #1E1E1E;
            color: #E0E0E0;
            gap: 10px;
        }

        #login-screen h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        #login-screen input {
            width: 260px;
            padding: 11px 14px;
            font-size: 16px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2E2E2E;
            color: #E0E0E0;
            outline: none;
        }

        #login-screen input:focus {
            border-color: #888;
        }

        .login-buttons {
            display: flex;
            gap: 10px;
            width: 260px;
            margin-top: 4px;
        }

        .login-buttons button {
            flex: 1;
            padding: 11px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-buttons button:hover { opacity: 0.85; }

        .btn-login {
            background: #555;
            color: #FFF;
        }

        .btn-register {
            background: #444;
            color: #EEE;
        }

        #login-msg {
            color: #E06060;
            font-size: 14px;
            min-height: 20px;
        }

        /* ===== モーダル共通 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal-box {
            background: #2E2E2E;
            color: #E0E0E0;
            padding: 24px 20px;
            border-radius: 12px;
            text-align: center;
            width: 300px;
            max-width: calc(100vw - 32px);
        }

        .modal-box p {
            margin-bottom: 20px;
            line-height: 1.5;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .modal-buttons button:hover { opacity: 0.85; }

        .btn-danger {
            background: #555;
            color: #FFF;
        }

        .btn-ok {
            background: #555;
            color: #FFF;
        }

        .btn-cancel {
            background: #333;
            color: #AAA;
            border: 1px solid #555;
        }

        /* ===== スマホレイアウト ===== */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .memo-list-screen {
                flex: none;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0;
                left: 0;
            }

            .editor-screen {
                flex: none;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0;
                left: 0;
                transform: translateX(100%);
                transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 10;
            }

            .editor-screen.active {
                transform: translateX(0);
            }

            .back-btn {
                display: flex !important;
            }
        }

        /* PCでは back ボタンを隠す */
        @media (min-width: 769px) {
            .back-btn {
                display: none !important;
            }
        }

        /* セーフエリア対応（iPhone X以降） */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .memo-list {
                padding-bottom: env(safe-area-inset-bottom);
            }
        }

        /* ===== ローディングスピナー ===== */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            justify-content: center;
            align-items: center;
            z-index: 300;
        }

        #loading-overlay.visible {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 表サイズ選択ピッカー ===== */
        #table-size-picker {
            display: none;
            position: fixed;
            background: #2A2A2A;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            z-index: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            user-select: none;
        }

        body.light #table-size-picker {
            background: #FFF;
            border-color: #DDD;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(6, 20px);
            gap: 3px;
        }

        .tpick-cell {
            width: 20px;
            height: 20px;
            border: 1px solid #555;
            border-radius: 2px;
            cursor: pointer;
        }

        body.light .tpick-cell { border-color: #CCC; }

        .tpick-cell.tpick-active {
            background: #666;
            border-color: #AAA;
        }

        body.light .tpick-cell.tpick-active {
            background: #CCC;
            border-color: #888;
        }

        .table-pick-label {
            text-align: center;
            font-size: 11px;
            margin-top: 6px;
            color: #AAA;
        }

        body.light .table-pick-label { color: #777; }

        /* ===== エディタ内テーブル ===== */
        .ql-editor table {
            border-collapse: collapse;
            max-width: 100%;
            margin: 8px 0;
            table-layout: fixed;
        }

        .ql-editor td, .ql-editor th {
            padding: 6px 10px;
            min-width: 60px;
            border: 1px solid;
            vertical-align: top;
            word-break: break-word;
        }

        body.dark .ql-editor td,
        body.dark .ql-editor th { border-color: #555; }

        body.light .ql-editor td,
        body.light .ql-editor th { border-color: #CCC; }

        /* ===== ヘッダーピッカー 日本語化 ===== */
        .ql-snow .ql-picker.ql-header .ql-picker-label::before,
        .ql-snow .ql-picker.ql-header .ql-picker-item::before { content: '標準' !important; }
        .ql-snow .ql-picker.ql-header .ql-picker-label[data-value="1"]::before,
        .ql-snow .ql-picker.ql-header .ql-picker-item[data-value="1"]::before { content: '見出し1' !important; }
        .ql-snow .ql-picker.ql-header .ql-picker-label[data-value="2"]::before,
        .ql-snow .ql-picker.ql-header .ql-picker-item[data-value="2"]::before { content: '見出し2' !important; }
        .ql-snow .ql-picker.ql-header .ql-picker-label[data-value="3"]::before,
        .ql-snow .ql-picker.ql-header .ql-picker-item[data-value="3"]::before { content: '見出し3' !important; }

        /* ===== ピッカードロップダウン（position:fixed 後の見た目） ===== */
        .ql-snow .ql-picker-options {
            z-index: 9999;
            min-width: 0 !important;
            max-width: 300px !important;
            width: max-content;
            white-space: normal;
            box-sizing: border-box;
        }
        body.dark .ql-snow .ql-picker-options {
            background: #2E2E2E !important;
            border-color: #444 !important;
            color: #CCC;
        }
        body.dark .ql-snow .ql-picker-options .ql-picker-item {
            color: #CCC;
        }
        body.dark .ql-snow .ql-picker-options .ql-picker-item:hover,
        body.dark .ql-snow .ql-picker-options .ql-picker-item.ql-selected {
            color: #FFF;
        }

        /* カラーピッカー ダーク対応 */
        body.dark .ql-picker.ql-color .ql-picker-options,
        body.dark .ql-picker.ql-background .ql-picker-options { background: #333; }
        body.dark .ql-snow .ql-color-picker .ql-picker-label svg { stroke: #BBB; }

        /* 色なし（テーマ色に戻す）スウォッチ — 最初の項目に×印 */
        .ql-snow .ql-color-picker .ql-picker-options .ql-picker-item[data-value=""] {
            background: transparent !important;
            position: relative;
            border: 1px solid #AAA !important;
        }
        .ql-snow .ql-color-picker .ql-picker-options .ql-picker-item[data-value=""]::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom right,
                transparent calc(50% - 0.5px),
                #c00 calc(50% - 0.5px),
                #c00 calc(50% + 0.5px),
                transparent calc(50% + 0.5px)
            );
        }

        /* 表挿入ボタンのアイコン色 — .ql-stroke クラスで他のボタンと共通スタイルを使用 */

        /* 表埋め込みブロック */
        .ql-html-table {
            margin: 4px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .ql-html-table table {
            border-collapse: collapse;
            min-width: 120px;
        }
        .ql-html-table td,
        .ql-html-table th {
            border: 1px solid;
            padding: 6px 10px;
            min-width: 60px;
            vertical-align: top;
            word-break: break-word;
            outline: none;
        }
        body.dark .ql-html-table td,
        body.dark .ql-html-table th { border-color: #555; }
        body.light .ql-html-table td,
        body.light .ql-html-table th { border-color: #CCC; }
    </style>
</head>

<body class="dark">

    <!-- ▼ログイン画面 -->
    <div id="login-screen">
        <h2>メモ帳</h2>
        <input type="text" id="userid" placeholder="ユーザーID" autocomplete="username" autocapitalize="none">
        <input type="password" id="password" placeholder="パスワード" autocomplete="current-password">
        <div class="login-buttons">
            <button class="btn-login" onclick="login()">ログイン</button>
            <button class="btn-register" onclick="register()">新規登録</button>
        </div>
        <p id="login-msg"></p>
    </div>

    <!-- ▼削除確認モーダル -->
    <div id="delete-modal" class="modal-overlay">
        <div class="modal-box">
            <p>このメモを削除しますか？</p>
            <div class="modal-buttons">
                <button id="confirm-delete" class="btn-danger">削除</button>
                <button id="cancel-delete" class="btn-cancel">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- ▼未保存警告モーダル -->
    <div id="unsaved-modal" class="modal-overlay">
        <div class="modal-box">
            <p>編集が保存されていません。切り替えますか？</p>
            <div class="modal-buttons">
                <button id="unsaved-ok" class="btn-ok">切り替える</button>
                <button id="unsaved-cancel" class="btn-cancel">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- ▼表サイズ選択ピッカー -->
    <div id="table-size-picker">
        <div class="table-grid" id="table-grid"></div>
        <div class="table-pick-label" id="table-pick-label">1 × 1</div>
    </div>

    <!-- ▼ローディングスピナー -->
    <div id="loading-overlay"><div class="spinner"></div></div>

    <!-- ▼メモアプリ -->
    <div id="memo-app" style="display:none;">
        <div id="container" class="container">

            <!-- 一覧 -->
            <div id="memo-list-screen" class="memo-list-screen">
                <div class="list-header">
                    <button class="icon-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="テーマ切替">🌙</button>
                    <input type="search" id="search-bar" class="search-bar" placeholder="検索...">
                    <button class="icon-btn" onclick="createNewMemo()" title="新規メモ">＋</button>
                    <button class="icon-btn" onclick="logout()" title="ログアウト">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3H4a1 1 0 00-1 1v10a1 1 0 001 1h3"/><polyline points="11 13 15 9 11 5"/><line x1="15" y1="9" x2="7" y2="9"/></svg>
                    </button>
                </div>
                <div class="memo-list" id="memo-list"></div>
            </div>

            <!-- エディタ -->
            <div id="editor-screen" class="editor-screen">
                <input type="hidden" id="memo-id">
                <div class="editor-inner">
                    <div class="editor-island">
                        <div class="editor-header">
                            <button class="icon-btn back-btn" onclick="backToList()" title="一覧へ">
                                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 4.5 6.5 9 11 13.5"/></svg>
                            </button>
                            <input type="text" id="memo-title" class="title-input" placeholder="タイトル">
                            <button class="icon-btn" id="save-memo" title="保存 (Ctrl+S)">
                                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3.5 9.5 7 13 14.5 5"/></svg>
                            </button>
                            <button class="icon-btn" id="delete-memo" title="削除">
                                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="5" x2="15" y2="5"/><path d="M7.5 5V3.5a.5.5 0 01.5-.5h2a.5.5 0 01.5.5V5"/><path d="M5.5 5.5l1 9h5l1-9"/></svg>
                            </button>
                        </div>
                        <!-- ql-toolbar はQuill初期化後にJSでここに移動 -->
                    </div>
                    <div class="quill-wrapper">
                        <div id="quill-editor"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script>
        // ===== 表用カスタムブロット（Quill初期化前に登録） =====
        // BlockEmbed として登録することで Quill が内部構造を正規化しない
        (function () {
            var BlockEmbed = Quill.import('blots/block/embed');
            var HtmlTableBlot = (class extends BlockEmbed {
                static create(value) {
                    var node = super.create();
                    node.innerHTML = value;
                    // セルを編集可能にする
                    node.querySelectorAll('td, th').forEach(function (cell) {
                        cell.contentEditable = 'true';
                    });
                    return node;
                }
                static value(node) {
                    return node.innerHTML;
                }
            });
            HtmlTableBlot.blotName = 'html-table';
            HtmlTableBlot.tagName = 'div';
            HtmlTableBlot.className = 'ql-html-table';
            Quill.register(HtmlTableBlot, true);
        })();

        // ===== Quill初期化 =====
        var quill = new Quill('#quill-editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [
                        '',
                        '#000000', '#444444', '#888888', '#bbbbbb', '#ffffff',
                        '#e60000', '#ff9900', '#ffff00', '#008a00', '#0066cc', '#9933ff',
                        '#f06666', '#ffc266', '#ffff66', '#66b966', '#66a3e0', '#c285ff',
                        '#a10000', '#b26b00', '#b2b200', '#006100', '#0047b2', '#6b24b2'
                    ] }, { 'background': [
                        '',
                        '#000000', '#444444', '#888888', '#bbbbbb', '#ffffff',
                        '#e60000', '#ff9900', '#ffff00', '#008a00', '#0066cc', '#9933ff',
                        '#f06666', '#ffc266', '#ffff66', '#66b966', '#66a3e0', '#c285ff',
                        '#a10000', '#b26b00', '#b2b200', '#006100', '#0047b2', '#6b24b2'
                    ] }],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['blockquote', 'code-block'],
                    ['link', 'image'],
                    ['clean']
                ]
            },
            placeholder: '本文を入力...'
        });

        // ===== ツールバーを浮島に移動 =====
        (function () {
            var toolbar = document.querySelector('.ql-toolbar');
            var island = document.querySelector('.editor-island');
            if (toolbar && island) island.appendChild(toolbar);
        })();

        // ===== ツールバーのピッカードロップダウンを overflow:hidden の外に展開 =====
        (function () {
            var toolbar = document.querySelector('.ql-toolbar');
            if (!toolbar) return;

            toolbar.querySelectorAll('.ql-picker').forEach(function (picker) {
                var opts = picker.querySelector('.ql-picker-options');
                if (!opts) return;

                new MutationObserver(function () {
                    if (picker.classList.contains('ql-expanded')) {
                        var r = picker.getBoundingClientRect();
                        var top = r.bottom + 2;
                        var left = r.left;

                        opts.style.position = 'fixed';
                        opts.style.top = top + 'px';
                        opts.style.zIndex = '9999';
                        opts.style.left = '';

                        // 右端はみ出し防止（サイズ確定後に調整）
                        requestAnimationFrame(function () {
                            var w = opts.offsetWidth;
                            if (left + w > window.innerWidth) {
                                left = window.innerWidth - w - 4;
                            }
                            opts.style.left = Math.max(0, left) + 'px';
                        });
                    } else {
                        opts.style.position = '';
                        opts.style.top = '';
                        opts.style.left = '';
                        opts.style.zIndex = '';
                    }
                }).observe(picker, { attributes: true, attributeFilter: ['class'] });
            });
        })();

        // ===== 表挿入ボタンをツールバーに追加 =====
        (function () {
            var toolbar = document.querySelector('.ql-toolbar');
            if (!toolbar) return;
            var group = document.createElement('span');
            group.className = 'ql-formats';
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.title = '表を挿入';
            btn.className = 'ql-table-btn';
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect class="ql-stroke" x="1" y="1" width="14" height="14" rx="1.5"/><line class="ql-stroke" x1="6" y1="1" x2="6" y2="15"/><line class="ql-stroke" x1="11" y1="1" x2="11" y2="15"/><line class="ql-stroke" x1="1" y1="6" x2="15" y2="6"/><line class="ql-stroke" x1="1" y1="11" x2="15" y2="11"/></svg>';
            btn.addEventListener('mousedown', function (e) {
                e.preventDefault();
                e.stopPropagation();
                toggleTablePicker(btn);
            });
            group.appendChild(btn);
            toolbar.appendChild(group);
        })();

        // ===== 全文コピー・Markdownコピーボタンをツールバーに追加 =====
        (function () {
            var toolbar = document.querySelector('.ql-toolbar');
            if (!toolbar) return;

            function makeBtn(title, svgInner, onClick) {
                var group = document.createElement('span');
                group.className = 'ql-formats';
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.title = title;
                btn.innerHTML = svgInner;
                btn.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    onClick();
                });
                group.appendChild(btn);
                toolbar.appendChild(group);
            }

            makeBtn('全文をコピー',
                '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect class="ql-stroke" x="5" y="1" width="9" height="11" rx="1.5"/><path class="ql-stroke" d="M3 4H2a1 1 0 00-1 1v9a1 1 0 001 1h8a1 1 0 001-1v-1"/></svg>',
                function () { copyAllContent(); }
            );

            makeBtn('Markdownとしてコピー',
                '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect class="ql-stroke" x="1" y="3" width="14" height="10" rx="1.5"/><path class="ql-stroke" d="M4 10.5V6l2.5 2.5L9 6v4.5"/><line class="ql-stroke" x1="11" y1="10.5" x2="13" y2="10.5"/><line class="ql-stroke" x1="12" y1="6" x2="12" y2="10.5"/></svg>',
                function () { copyAsMarkdown(); }
            );
        })();

        // ===== 表サイズピッカー =====
        (function () {
            var picker = document.getElementById('table-size-picker');
            var grid = document.getElementById('table-grid');
            var label = document.getElementById('table-pick-label');
            var ROWS = 6, COLS = 6;
            var cells = [];

            for (var r = 1; r <= ROWS; r++) {
                for (var c = 1; c <= COLS; c++) {
                    (function (row, col) {
                        var cell = document.createElement('div');
                        cell.className = 'tpick-cell';
                        cell.addEventListener('mouseover', function () {
                            label.textContent = row + ' × ' + col;
                            cells.forEach(function (item) {
                                item.el.classList.toggle('tpick-active',
                                    item.r <= row && item.c <= col);
                            });
                        });
                        cell.addEventListener('click', function () {
                            picker.style.display = 'none';
                            insertTable(row, col);
                        });
                        grid.appendChild(cell);
                        cells.push({ el: cell, r: r, c: c });
                    })(r, c);
                }
            }

            document.addEventListener('click', function (e) {
                if (!picker.contains(e.target) && !e.target.closest('.ql-table-btn')) {
                    picker.style.display = 'none';
                }
            });
        })();

        function toggleTablePicker(btn) {
            var picker = document.getElementById('table-size-picker');
            if (picker.style.display === 'block') {
                picker.style.display = 'none';
                return;
            }
            var rect = btn.getBoundingClientRect();
            picker.style.top = (rect.bottom + 4) + 'px';
            picker.style.left = rect.left + 'px';
            picker.style.display = 'block';
        }

        function insertTable(rows, cols) {
            var html = '<table><tbody>';
            for (var r = 0; r < rows; r++) {
                html += '<tr>';
                for (var c = 0; c < cols; c++) {
                    html += '<td><br></td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table>';

            quill.focus();
            var range = quill.getSelection(true);
            var index = range ? range.index : quill.getLength() - 1;
            // html-table ブロットとして挿入 → Quill が内部を正規化しない
            quill.insertEmbed(index, 'html-table', html, 'user');
            quill.setSelection(index + 1, 0);
            isDirty = true;
        }

        // ===== グローバル状態 =====
        var memoData = [];
        var selectedMemoId = null;
        var isDirty = false;
        var pendingAction = null;

        function b64e(u) { return btoa(unescape(encodeURIComponent(u))); }

        function showLoading() { document.getElementById('loading-overlay').classList.add('visible'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.remove('visible'); }

        // ===== 初期化 =====
        document.addEventListener('DOMContentLoaded', function () {
            // 未保存モーダル
            document.getElementById('unsaved-ok').onclick = function () {
                document.getElementById('unsaved-modal').style.display = 'none';
                if (pendingAction) { var a = pendingAction; pendingAction = null; a(); }
            };
            document.getElementById('unsaved-cancel').onclick = function () {
                document.getElementById('unsaved-modal').style.display = 'none';
                pendingAction = null;
            };

            // URLパラメータ自動ログイン
            var params = new URLSearchParams(location.search);
            var id = params.get('id');
            var pw = params.get('pw');
            if (id) document.getElementById('userid').value = id;
            if (pw) document.getElementById('password').value = pw;
            if (id && pw) login();

            // セッション復元
            var savedId = sessionStorage.getItem('userId');
            if (savedId) showMemoScreen();

            // Enterキーでログイン
            document.getElementById('password').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') login();
            });

            // サービスワーカー登録
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(function () {});
            }
        });

        // ===== 認証 =====
        async function login() {
            var id = document.getElementById('userid').value.trim();
            var pw = document.getElementById('password').value;
            var msg = document.getElementById('login-msg');
            if (!id || !pw) { msg.textContent = 'IDとパスワードを入力してください。'; return; }

            var res = await fetch('auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'mode=login&id=' + encodeURIComponent(id) + '&pw=' + encodeURIComponent(pw)
            });
            var text = await res.text();
            if (text.includes('ログイン成功')) {
                sessionStorage.setItem('userId', id);
                showMemoScreen();
            } else {
                msg.textContent = text;
            }
        }

        async function register() {
            var id = document.getElementById('userid').value.trim();
            var pw = document.getElementById('password').value;
            var msg = document.getElementById('login-msg');
            if (!id || !pw) { msg.textContent = 'IDとパスワードを入力してください。'; return; }

            var res = await fetch('auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'mode=register&id=' + encodeURIComponent(id) + '&pw=' + encodeURIComponent(pw)
            });
            msg.textContent = await res.text();
        }

        function logout() {
            sessionStorage.removeItem('userId');
            location.reload();
        }

        // ===== メインアプリ表示 =====
        function showMemoScreen() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('memo-app').style.display = 'block';

            var savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);

            document.getElementById('save-memo').addEventListener('click', saveMemo);
            document.getElementById('delete-memo').addEventListener('click', deleteMemo);
            document.getElementById('search-bar').addEventListener('input', searchMemos);

            // タイトル変更でdirty
            document.getElementById('memo-title').addEventListener('input', function () { isDirty = true; });

            // Quillでユーザー操作のみdirty（API経由の読み込みは除外）
            quill.on('text-change', function (delta, oldDelta, source) {
                if (source === 'user') isDirty = true;
            });

            // 表セル内の編集も dirty として検出（Quill のtext-change では補足されない）
            quill.root.addEventListener('input', function (e) {
                if (e.target.closest && e.target.closest('.ql-html-table')) {
                    isDirty = true;
                }
            }, true);

            loadMemos();
        }

        // ===== キーボードショートカット =====
        document.addEventListener('keydown', function (e) {
            if (!(e.ctrlKey || e.metaKey)) return;
            if (e.key === 's' || e.key === 'S') {
                var editorVisible = document.getElementById('editor-screen').classList.contains('active')
                    || window.innerWidth > 768;
                if (editorVisible) {
                    e.preventDefault();
                    saveMemo();
                }
            } else if (e.key === 'n' || e.key === 'N') {
                e.preventDefault();
                createNewMemo();
            }
        });

        // ===== 全文コピー =====
        function copyAllContent() {
            var html = quill.root.innerHTML;
            var text = quill.getText();
            if (navigator.clipboard && window.ClipboardItem) {
                var item = new ClipboardItem({
                    'text/html': new Blob([html], { type: 'text/html' }),
                    'text/plain': new Blob([text], { type: 'text/plain' })
                });
                navigator.clipboard.write([item]).catch(function () {
                    navigator.clipboard.writeText(text);
                });
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            }
        }

        // ===== Markdownコピー =====
        function copyAsMarkdown() {
            var md = htmlToMarkdown(quill.root.innerHTML);
            if (navigator.clipboard) {
                navigator.clipboard.writeText(md);
            }
        }

        function htmlToMarkdown(html) {
            var parser = new DOMParser();
            var doc = parser.parseFromString(html, 'text/html');
            return domToMd(doc.body).replace(/\n{3,}/g, '\n\n').trim();
        }

        function domToMd(node) {
            var out = '';
            node.childNodes.forEach(function (child) { out += nodeMd(child); });
            return out;
        }

        function nodeMd(node) {
            if (node.nodeType === 3) return node.textContent;
            if (node.nodeType !== 1) return '';
            var tag = node.tagName.toLowerCase();
            var inner = domToMd(node);
            switch (tag) {
                case 'h1': return '# ' + inner.trim() + '\n\n';
                case 'h2': return '## ' + inner.trim() + '\n\n';
                case 'h3': return '### ' + inner.trim() + '\n\n';
                case 'p': return inner.trim() ? inner.trim() + '\n\n' : '';
                case 'br': return '\n';
                case 'strong': case 'b': return '**' + inner + '**';
                case 'em': case 'i': return '*' + inner + '*';
                case 's': case 'del': return '~~' + inner + '~~';
                case 'u': return inner;
                case 'code':
                    return node.parentElement && node.parentElement.tagName === 'PRE'
                        ? inner : '`' + inner + '`';
                case 'pre': return '```\n' + node.textContent.trim() + '\n```\n\n';
                case 'blockquote':
                    return inner.trim().split('\n').map(function (l) { return '> ' + l; }).join('\n') + '\n\n';
                case 'ul': return inner + '\n';
                case 'ol': return inner + '\n';
                case 'li': {
                    var p = node.parentElement;
                    var prefix = p && p.tagName === 'OL'
                        ? (Array.from(p.children).indexOf(node) + 1) + '. '
                        : '- ';
                    return prefix + inner.trim() + '\n';
                }
                case 'a': return '[' + inner + '](' + (node.getAttribute('href') || '') + ')';
                case 'img':
                    return '![' + (node.getAttribute('alt') || '') + '](' + (node.getAttribute('src') || '') + ')';
                case 'table': return tableMd(node) + '\n\n';
                case 'thead': case 'tbody': case 'tr': case 'td': case 'th': return inner;
                default: return inner;
            }
        }

        function tableMd(table) {
            var rows = Array.from(table.querySelectorAll('tr'));
            if (!rows.length) return '';
            var lines = rows.map(function (row) {
                var cells = Array.from(row.querySelectorAll('td,th')).map(function (c) {
                    return c.textContent.trim().replace(/\|/g, '\\|');
                });
                return '| ' + cells.join(' | ') + ' |';
            });
            if (rows.length > 0) {
                var cols = rows[0].querySelectorAll('td,th').length;
                lines.splice(1, 0, '| ' + Array(cols).fill('---').join(' | ') + ' |');
            }
            return lines.join('\n');
        }

        // ===== テーマ =====
        function toggleTheme() {
            var t = document.body.classList.contains('dark') ? 'light' : 'dark';
            setTheme(t);
            localStorage.setItem('theme', t);
        }

        function setTheme(theme) {
            document.body.classList.remove('dark', 'light');
            document.body.classList.add(theme);
            document.getElementById('theme-toggle-btn').textContent = theme === 'dark' ? '🌙' : '🌞';
            var meta = document.getElementById('theme-color-meta');
            if (meta) meta.content = theme === 'dark' ? '#1E1E1E' : '#FAFAFA';
        }

        // ===== AJAX =====
        function ajaxRequest(url, method, data, callback) {
            var userId = sessionStorage.getItem('userId') || '';
            if (!userId) return;

            var xhr = new XMLHttpRequest();
            xhr.open(method, url, true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            var sendData = (data ? data + '&' : '') + 'user=' + encodeURIComponent(userId);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) callback(xhr.responseText);
            };
            xhr.send(sendData);
        }

        // ===== 未保存フラグ =====
        function setCleanState() {
            isDirty = false;
        }

        function requestSwitch(action) {
            if (!isDirty) { action(); return; }
            pendingAction = action;
            document.getElementById('unsaved-modal').style.display = 'flex';
        }

        // ===== メモ一覧 =====
        function loadMemos() {
            showLoading();
            ajaxRequest('memo.php?action=read', 'POST', null, function (response) {
                hideLoading();
                try { memoData = JSON.parse(response); } catch (e) { memoData = []; }
                memoData.sort(function (a, b) { return new Date(b.updated_at) - new Date(a.updated_at); });
                displayMemos(memoData);
            });
        }

        function displayMemos(memos) {
            var list = document.getElementById('memo-list');
            list.innerHTML = '';
            for (var i = 0; i < memos.length; i++) {
                (function (memo) {
                    var div = document.createElement('div');
                    div.className = 'memo-list-item' + (memo.id == selectedMemoId ? ' active-memo' : '');
                    div.setAttribute('data-id', memo.id);

                    var titleEl = document.createElement('div');
                    titleEl.className = 'memo-title-text';
                    titleEl.textContent = memo.title || '（無題）';

                    var dateEl = document.createElement('div');
                    dateEl.className = 'memo-date-text';
                    dateEl.textContent = memo.updated_at;

                    div.appendChild(titleEl);
                    div.appendChild(dateEl);

                    div.onclick = function () {
                        requestSwitch(function () { openEditor(memo); });
                    };
                    list.appendChild(div);
                })(memos[i]);
            }
        }

        function highlightActiveMemo() {
            var items = document.getElementById('memo-list').children;
            for (var i = 0; i < items.length; i++) {
                var id = items[i].getAttribute('data-id');
                items[i].classList.toggle('active-memo', id == selectedMemoId);
            }
        }

        // ===== メモ操作 =====
        function createNewMemo() {
            requestSwitch(function () {
                selectedMemoId = null;
                document.getElementById('memo-id').value = 'new';
                var jst = new Date(new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' }));
                document.getElementById('memo-title').value =
                    jst.getFullYear() +
                    ('0' + (jst.getMonth() + 1)).slice(-2) +
                    ('0' + jst.getDate()).slice(-2);
                quill.setContents([]);
                highlightActiveMemo();
                document.getElementById('editor-screen').classList.add('active');
                quill.focus();
                setTimeout(setCleanState, 0);
            });
        }

        function openEditor(memo) {
            selectedMemoId = memo.id;
            document.getElementById('memo-id').value = memo.id;
            document.getElementById('memo-title').value = memo.title;

            var body = memo.body || '';
            if (body.indexOf('<') === -1 && body.indexOf('\\n') !== -1) {
                // 旧テキスト形式（CSV時代の互換）
                body = body.replace(/\\n/g, '\n').replace(/\\r/g, '\r');
                quill.setText(body);
            } else {
                // 旧形式の生 <table> を html-table ブロット用 div にラップして移行
                if (body.indexOf('<table') !== -1 && body.indexOf('ql-html-table') === -1) {
                    body = body.replace(/<table([\s\S]*?)<\/table>/g,
                        '<div class="ql-html-table"><table$1</table></div>');
                }
                quill.clipboard.dangerouslyPasteHTML(body);
            }

            highlightActiveMemo();
            document.getElementById('editor-screen').classList.add('active');
            // 非同期で clean にして Quill の API 由来 text-change より後に確実にリセット
            setTimeout(setCleanState, 0);
        }

        function backToList() {
            requestSwitch(_doBackToList);
        }

        function _doBackToList() {
            document.getElementById('editor-screen').classList.remove('active');
        }

        function saveMemo() {
            var id = document.getElementById('memo-id').value;
            var title = document.getElementById('memo-title').value;
            var body = quill.root.innerHTML;

            showLoading();
            ajaxRequest('memo.php?action=save', 'POST',
                'id=' + encodeURIComponent(id) +
                '&title=' + encodeURIComponent(b64e(title)) +
                '&body=' + encodeURIComponent(b64e(body)),
                function (response) {
                    hideLoading();
                    var result;
                    try { result = JSON.parse(response); } catch (e) { return; }

                    var newId = result.id;
                    selectedMemoId = newId;
                    document.getElementById('memo-id').value = newId;

                    // 保存後にdirtyフラグをリセット（モバイルで一覧に戻った後の誤警告を防ぐ）
                    setCleanState();

                    loadMemosWithSelection(newId);

                    // モバイルでは保存後に一覧へ戻る（保存済みなので警告なしで遷移）
                    if (window.innerWidth <= 768) {
                        _doBackToList();
                    }
                }
            );
        }

        function loadMemosWithSelection(activeId) {
            ajaxRequest('memo.php?action=read', 'POST', '', function (response) {
                try { memoData = JSON.parse(response); } catch (e) { return; }
                memoData.sort(function (a, b) { return new Date(b.updated_at) - new Date(a.updated_at); });
                selectedMemoId = Number(activeId);
                displayMemos(memoData);
            });
        }

        function deleteMemo() {
            var id = document.getElementById('memo-id').value;
            if (!id || id === 'new') { alert('このメモはまだ保存されていません。'); return; }

            var modal = document.getElementById('delete-modal');
            modal.style.display = 'flex';

            document.getElementById('confirm-delete').onclick = function () {
                modal.style.display = 'none';
                ajaxRequest('memo.php?action=delete&id=' + encodeURIComponent(id), 'POST', null, function () {
                    ajaxRequest('memo.php?action=read', 'POST', null, function (response) {
                        try { memoData = JSON.parse(response); } catch (e) { memoData = []; }
                        memoData.sort(function (a, b) { return new Date(b.updated_at) - new Date(a.updated_at); });

                        if (memoData.length > 0) {
                            selectedMemoId = memoData[0].id;
                            displayMemos(memoData);
                            openEditor(memoData[0]);
                        } else {
                            selectedMemoId = null;
                            document.getElementById('memo-id').value = '';
                            document.getElementById('memo-title').value = '';
                            quill.setContents([]);
                            setCleanState();
                            displayMemos([]);
                            _doBackToList();
                        }
                    });
                });
            };

            document.getElementById('cancel-delete').onclick = function () {
                modal.style.display = 'none';
            };
        }

        function searchMemos() {
            var query = document.getElementById('search-bar').value.toLowerCase();
            var filtered = memoData.filter(function (m) {
                var bodyText = m.body.replace(/<[^>]+>/g, '');
                return m.title.toLowerCase().includes(query) || bodyText.toLowerCase().includes(query);
            });
            displayMemos(filtered);
        }
    </script>

</body>
</html>
